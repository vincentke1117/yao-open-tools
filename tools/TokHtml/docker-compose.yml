services:
  tokhtml:
    build: .
    container_name: tokhtml
    ports:
      - "${TOKHTML_HOST_PORT:-18082}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      TOKHTML_DATA_DIR: /app/data
      TOKHTML_WATCH_DIRS: /watch/html-inbox
      TOKHTML_ALLOW_SOURCE_WRITE: "false"
      TOKHTML_SOFFICE_BIN: soffice
    volumes:
      - ./data:/app/data
      - ./html-inbox:/watch/html-inbox
    restart: unless-stopped
